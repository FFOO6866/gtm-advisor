[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "knowledge"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pypdf>=6.8.0",
    "openai>=2.15.0",
    "vector-store",
]

[tool.uv.sources]
vector-store = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src"]
