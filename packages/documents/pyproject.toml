[project]
name = "gtm-advisor-documents"
version = "0.1.0"
description = "GTM Advisor Document Download and Processing — PDF download, text extraction, section detection"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pypdf>=6.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
